<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmuGallery | CHIP-8 Emulator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>EmuGallery</h1>

    <div id="emulator-container">
        <canvas id="chip8" width="640" height="320"></canvas>
        <div class="controls-help">
            Layout de teslas: 1-4, Q-R, A-F, Z-V para el teclado 4x4
        </div>
    </div>

    <div id="rom-gallery">
        <!-- Las ROMs se cargarán dinámicamente aquí -->
    </div>

    <script src="src/emulator/chip-8/cpu.js"></script>
    <script src="src/emulator/chip-8/rom_magnament.js"></script>
    <script src="src/emulator/chip-8/app.js"></script>
</body>

</html>
